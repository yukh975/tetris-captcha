<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris CAPTCHA</title>
    <style>
        /* ── Theme ── */
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2e3147;
            --text: #e2e4ef;
            --muted: #8890b5;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --radius: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Form ── */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }
        .card h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: default; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            z-index: 2000;
            transition: transform .3s ease;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }

        /* ── Modal overlay ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            max-width: 720px;
            width: 95vw;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-size: 1.15rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .modal .hint {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text); }

        /* ── CAPTCHA area: board centered, pieces around it ── */
        .captcha-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .board-wrap {
            position: relative;
        }
        .board-wrap canvas {
            border-radius: 6px;
        }
        .pieces-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: flex-end;
            max-width: 600px;
        }
        .pieces-panel .piece-label {
            display: none;
        }
        .piece-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .piece-canvas {
            cursor: grab;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: border-color .15s, box-shadow .15s;
        }
        .piece-canvas:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(88,166,255,0.3);
        }
        .piece-canvas.dragging {
            opacity: 0.4;
        }

        /* ── Drag ghost ── */
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 1500;
            opacity: 0.85;
        }

        /* ── Feedback ── */
        .captcha-feedback {
            text-align: center;
            margin-top: 16px;
            min-height: 24px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .captcha-feedback.fail { color: var(--danger); }
        .captcha-feedback.ok { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Обратная связь</h1>
        <form id="mainForm">
            <div class="form-group">
                <label for="message">Сообщение</label>
                <textarea id="message" placeholder="Напишите что-нибудь…"></textarea>
            </div>
            <!-- Honeypot: hidden from humans, bots will fill it -->
            <div style="position:absolute;left:-9999px;top:-9999px;opacity:0;height:0;overflow:hidden" aria-hidden="true">
                <label for="website">Website</label>
                <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
            </div>
            <button type="submit" class="btn">Отправить</button>
        </form>
    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- CAPTCHA modal -->
<div class="modal-overlay" id="captchaOverlay">
    <div class="modal">
        <button class="modal-close" id="captchaClose">&times;</button>
        <h2>Подтвердите, что вы человек</h2>
        <p class="hint">Поставьте фигуры на свои места</p>
        <div class="captcha-area">
            <div class="pieces-panel" id="piecesPanelTop"></div>
            <div class="board-wrap">
                <canvas id="boardCanvas" width="280" height="280"></canvas>
            </div>
            <div class="pieces-panel" id="piecesPanelBottom"></div>
        </div>
        <div class="captcha-feedback" id="captchaFeedback"></div>
    </div>
</div>

<script src="captcha.js"></script>

</body>
</html>
